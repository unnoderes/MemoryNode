# Replace __SERVER_NAME__ and __PUBLIC_ORIGIN__ before enabling this site.
# Do not expose ports 8000, 3000, 8765, or the SQLite database in an ECS security group.

server {
    listen 80;
    server_name __SERVER_NAME__;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __SERVER_NAME__;

    ssl_certificate /etc/letsencrypt/live/__SERVER_NAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SERVER_NAME__/privkey.pem;

    # The console and API have no remote account system. Require a reviewer password.
    auth_basic "MemoryNode reviewer access";
    auth_basic_user_file /etc/nginx/.memorynode.htpasswd;

    # A public health check proves the ECS-hosted backend is reachable without exposing governance actions.
    location = /health {
        auth_basic off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The packaged console defaults to localhost. Nginx provides its public same-origin API address.
    location = /memorynode-config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store";
        return 200 'window.__MEMORYNODE_CONFIG__={"apiOrigin":"__PUBLIC_ORIGIN__"};';
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
